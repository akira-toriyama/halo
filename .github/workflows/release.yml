name: Release

# Thin caller of glyph's reusable rolling-DRAFT release. A push to main makes
# `glyph release` compute the next version and the notes from each merged
# PR's individual (pre-squash) commits — gitmoji-driven and squash-safe — and
# create/update a single DRAFT release (no tag until you Publish in the UI).
# The verdict + draft logic and the binary that runs it ship together from
# akira-toriyama/glyph at ONE concrete tag (never a moving ref); this file
# supplies only halo's name + install prose. glyph's release reusable is the
# successor of akira-toriyama/.github's release.yml@v1 (git-cliff); halo was
# its last release caller, so this flip lets that reusable retire. The
# git-cliff era config (cliff.toml) is gone — the classification table lives
# inside the glyph binary (`glyph rules`).
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Preview only (no draft; just artifacts)"
        type: boolean
        default: false

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    uses: akira-toriyama/glyph/.github/workflows/release.yml@v0.10.2
    with:
      app: Halo
      dry-run: ${{ github.event.inputs.dry_run == 'true' }}
      install-notes: |
        ## Install

        **Homebrew (build from source):**

        ```sh
        brew install akira-toriyama/tap/halo
        open "$(brew --prefix)/opt/halo/Halo.app"
        curl --create-dirs -o ~/.config/halo/config.toml \
          https://raw.githubusercontent.com/akira-toriyama/halo/main/config.toml
        ```

        **Prebuilt (`Halo.zip` below):** the app is ad-hoc signed
        (not notarized), so macOS quarantines it on download. After
        unzipping:

        ```sh
        xattr -dr com.apple.quarantine /Applications/Halo.app
        open /Applications/Halo.app
        ```

        halo needs **no permissions** — no Accessibility, no Screen
        Recording (it only reads window geometry via read-only private
        SkyLight and draws a click-through overlay). Just launch it.
