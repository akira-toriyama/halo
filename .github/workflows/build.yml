name: build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6

      # macos runners default to an older Xcode (Swift 5.x). Pin the
      # latest stable Xcode so the SkyLight / AppKit toolchain matches.
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show toolchain
        run: swift --version

      - name: Build (release)
        run: swift build -c release

      # No `swift test` step: halo has no test target (single-threaded
      # agent over private-SkyLight callbacks; nothing pure to unit-test
      # yet). Add the step here when a test target lands.

      - name: Assemble & ad-hoc sign app bundle
        env:
          CODESIGN_ID: "-"
        run: ./package.sh
