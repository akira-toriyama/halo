name: build

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  # Cancel in-flight builds on the same PR / branch when a new push
  # arrives — only the latest commit matters for the required check.
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-15
    # Bounded so a hung `swift build` can't burn 6 h of free macOS minutes.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      # Shared Swift build (setup-xcode + SPM cache + build + test). The
      # HaloTests target is the config-schema drift guard: it asserts the
      # committed config.schema.json equals `configSpec.jsonSchema()`, so the
      # editor schema can never drift from the parser (CLT ships no XCTest,
      # so this only runs here in CI).
      - uses: akira-toriyama/.github/actions/swift-build@main

      - name: Assemble & ad-hoc sign app bundle
        env:
          CODESIGN_ID: "-"
        run: ./package.sh
