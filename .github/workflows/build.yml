name: build

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  # Cancel in-flight builds on the same PR / branch when a new push
  # arrives — only the latest commit matters for the required check.
  group: build-${{ github.ref }}
  cancel-in-progress: true

# Least privilege, made explicit — closes zizmor's excessive-permissions
# finding ahead of the fleet-wide zizmor gate (akira-toriyama/.github t-qbp1).
permissions:
  contents: read

jobs:
  build:
    runs-on: macos-15
    # Bounded so a hung `swift build` can't burn 6 h of free macOS minutes.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          # Build/test/package only: the `git describe` in package.sh is a
          # local history read, nothing pushes — drop the persisted checkout
          # token. t-yaxa
          persist-credentials: false

      # Shared Swift build (setup-xcode + SPM cache + build + test). The
      # HaloTests target is the config-schema drift guard: it asserts the
      # committed config.schema.json equals `configSpec.jsonSchema()`, so the
      # editor schema can never drift from the parser (CLT ships no XCTest,
      # so this only runs here in CI).
      - uses: akira-toriyama/.github/actions/swift-build@v2

      - name: Assemble & ad-hoc sign app bundle
        env:
          CODESIGN_ID: "-"
        run: ./package.sh
